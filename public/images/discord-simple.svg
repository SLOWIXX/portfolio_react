<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgSimple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5865F2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5865F2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Discord Blue -->
  <rect width="800" height="600" fill="url(#bgSimple)"/>
  
  <!-- Simple Discord-style shape (simplified, not exact logo) -->
  <g transform="translate(400, 300)">
    <!-- Body shape - simplified rounded rectangle -->
    <rect x="-120" y="-100" width="240" height="200" rx="50" fill="white"/>
    
    <!-- Left eye -->
    <circle cx="-50" cy="-30" r="25" fill="#5865F2"/>
    
    <!-- Right eye -->
    <circle cx="50" cy="-30" r="25" fill="#5865F2"/>
  </g>
</svg>