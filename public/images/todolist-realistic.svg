<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 750">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="btnGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="redBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fee2e2"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>
    <linearGradient id="orangeBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fef3c7"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>
    <linearGradient id="greenBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d1fae5"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.12"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1400" height="750" fill="url(#bgGradient)"/>
  
  <!-- Header bar -->
  <rect x="80" y="40" width="1240" height="90" rx="16" fill="rgba(255,255,255,0.95)" filter="url(#shadow)"/>
  <text x="110" y="75" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="#667eea">🎯 Mode Preview - Stockage Local</text>
  <text x="110" y="102" font-family="Inter, sans-serif" font-size="12" fill="#9ca3af" font-style="italic">⚠️ Version simplifiée · Fonctionnalités limitées pour la démonstration</text>
  <rect x="1100" y="62" width="190" height="45" rx="8" fill="#ef4444"/>
  <text x="1195" y="90" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="white" text-anchor="middle">Réinitialiser les tâches</text>
  
  <!-- Create task card -->
  <rect x="80" y="160" width="620" height="520" rx="16" fill="white" filter="url(#shadow)"/>
  <text x="110" y="210" font-family="Inter, sans-serif" font-size="26" font-weight="700" fill="#1f2937">Créer une tâche</text>
  
  <!-- Nom de la tâche -->
  <text x="110" y="265" font-family="Inter, sans-serif" font-size="15" font-weight="500" fill="#1f2937">Nom de la tâche</text>
  <rect x="110" y="275" width="560" height="48" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="125" y="304" font-family="Inter, sans-serif" font-size="15" fill="#9ca3af">Entrez le nom de la tâche</text>
  
  <!-- Description -->
  <text x="110" y="360" font-family="Inter, sans-serif" font-size="15" font-weight="500" fill="#1f2937">Description (optionnelle)</text>
  <rect x="110" y="370" width="560" height="100" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="125" y="398" font-family="Inter, sans-serif" font-size="15" fill="#9ca3af">Ajoutez une description</text>
  
  <!-- Create button -->
  <rect x="110" y="500" width="560" height="52" rx="8" fill="url(#btnGradient)" filter="url(#shadow)"/>
  <text x="390" y="531" font-family="Inter, sans-serif" font-size="17" font-weight="600" fill="white" text-anchor="middle">Créer</text>
  
  <!-- Tasks list -->
  <!-- Task 1 - Vert (completed) -->
  <g>
    <rect x="740" y="160" width="580" height="110" rx="16" fill="url(#greenBg)" filter="url(#shadow)"/>
    <line x1="740" y1="170" x2="740" y2="260" stroke="#10b981" stroke-width="4" stroke-linecap="round"/>
    <circle cx="780" cy="215" r="25" fill="rgba(99,102,241,0.1)"/>
    <text x="780" y="227" font-size="28" text-anchor="middle">🚴</text>
    <text x="825" y="207" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#1f2937">Apprendre JavaScript</text>
    <text x="825" y="234" font-family="Inter, sans-serif" font-size="14" fill="#6b7280">Maîtriser les bases du langage</text>
    <text x="1225" y="218" font-size="24" text-anchor="middle">✅</text>
    <circle cx="1280" cy="215" r="15" fill="#ef4444"/>
    <text x="1280" y="221" font-size="18" font-weight="bold" text-anchor="middle" fill="white">×</text>
  </g>
  
  <!-- Task 2 - Orange (in progress) -->
  <g>
    <rect x="740" y="290" width="580" height="110" rx="16" fill="url(#orangeBg)" filter="url(#shadow)"/>
    <line x1="740" y1="300" x2="740" y2="390" stroke="#f59e0b" stroke-width="4" stroke-linecap="round"/>
    <circle cx="780" cy="345" r="25" fill="rgba(99,102,241,0.1)"/>
    <text x="780" y="357" font-size="28" text-anchor="middle">☕</text>
    <text x="825" y="337" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#1f2937">Créer un portfolio</text>
    <text x="825" y="364" font-family="Inter, sans-serif" font-size="14" fill="#6b7280">Développer un site vitrine professionnel</text>
    <text x="1225" y="348" font-size="24" text-anchor="middle">⏳</text>
    <circle cx="1280" cy="345" r="15" fill="#ef4444"/>
    <text x="1280" y="351" font-size="18" font-weight="bold" text-anchor="middle" fill="white">×</text>
  </g>
  
  <!-- Task 3 - Rouge (not started) -->
  <g>
    <rect x="740" y="420" width="580" height="110" rx="16" fill="url(#redBg)" filter="url(#shadow)"/>
    <line x1="740" y1="430" x2="740" y2="520" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
    <circle cx="780" cy="475" r="25" fill="rgba(99,102,241,0.1)"/>
    <text x="780" y="487" font-size="28" text-anchor="middle">😴</text>
    <text x="825" y="467" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#1f2937">Réviser pour les examens</text>
    <text x="1225" y="478" font-size="24" text-anchor="middle">❌</text>
    <circle cx="1280" cy="475" r="15" fill="#ef4444"/>
    <text x="1280" y="481" font-size="18" font-weight="bold" text-anchor="middle" fill="white">×</text>
  </g>
</svg>
