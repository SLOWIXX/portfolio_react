<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="appBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b4d8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0077b6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1faee;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#appBg)"/>
  
  <!-- Calendar Grid -->
  <rect x="150" y="100" width="500" height="400" rx="15" fill="url(#cardBg)" filter="drop-shadow(0 10px 30px rgba(0,0,0,0.2))"/>
  
  <!-- Calendar Header -->
  <rect x="150" y="100" width="500" height="60" rx="15" fill="#0077b6"/>
  <rect x="150" y="140" width="500" height="20" fill="#0077b6"/>
  <text x="400" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="white" font-weight="bold">Janvier 2025</text>
  
  <!-- Days of week -->
  <g font-family="Arial, sans-serif" font-size="14" fill="#666" font-weight="600">
    <text x="195" y="190" text-anchor="middle">LUN</text>
    <text x="266" y="190" text-anchor="middle">MAR</text>
    <text x="337" y="190" text-anchor="middle">MER</text>
    <text x="408" y="190" text-anchor="middle">JEU</text>
    <text x="479" y="190" text-anchor="middle">VEN</text>
    <text x="550" y="190" text-anchor="middle">SAM</text>
    <text x="621" y="190" text-anchor="middle">DIM</text>
  </g>
  
  <!-- Calendar days -->
  <g font-family="Arial, sans-serif" font-size="16" fill="#333">
    <!-- Week 1 -->
    <text x="195" y="230" text-anchor="middle">1</text>
    <text x="266" y="230" text-anchor="middle">2</text>
    <text x="337" y="230" text-anchor="middle">3</text>
    <text x="408" y="230" text-anchor="middle">4</text>
    <text x="479" y="230" text-anchor="middle">5</text>
    <circle cx="550" cy="223" r="20" fill="#e63946" opacity="0.2"/>
    <text x="550" y="230" text-anchor="middle" fill="#e63946" font-weight="bold">6</text>
    <circle cx="621" cy="223" r="20" fill="#e63946" opacity="0.2"/>
    <text x="621" y="230" text-anchor="middle" fill="#e63946" font-weight="bold">7</text>
    
    <!-- Week 2 -->
    <text x="195" y="280" text-anchor="middle">8</text>
    <text x="266" y="280" text-anchor="middle">9</text>
    <text x="337" y="280" text-anchor="middle">10</text>
    <text x="408" y="280" text-anchor="middle">11</text>
    <circle cx="479" cy="273" r="20" fill="#06d6a0" opacity="0.3"/>
    <text x="479" y="280" text-anchor="middle" fill="#06d6a0" font-weight="bold">12</text>
    <text x="550" y="280" text-anchor="middle">13</text>
    <text x="621" y="280" text-anchor="middle">14</text>
    
    <!-- Week 3 -->
    <circle cx="195" cy="323" r="20" fill="#0077b6" opacity="0.8"/>
    <text x="195" y="330" text-anchor="middle" fill="white" font-weight="bold">15</text>
    <text x="266" y="330" text-anchor="middle">16</text>
    <text x="337" y="330" text-anchor="middle">17</text>
    <circle cx="408" cy="323" r="20" fill="#06d6a0" opacity="0.3"/>
    <text x="408" y="330" text-anchor="middle" fill="#06d6a0" font-weight="bold">18</text>
    <circle cx="479" cy="323" r="20" fill="#06d6a0" opacity="0.3"/>
    <text x="479" y="330" text-anchor="middle" fill="#06d6a0" font-weight="bold">19</text>
    <text x="550" y="330" text-anchor="middle">20</text>
    <text x="621" y="330" text-anchor="middle">21</text>
    
    <!-- Week 4 -->
    <text x="195" y="380" text-anchor="middle">22</text>
    <text x="266" y="380" text-anchor="middle">23</text>
    <text x="337" y="380" text-anchor="middle">24</text>
    <text x="408" y="380" text-anchor="middle">25</text>
    <text x="479" y="380" text-anchor="middle">26</text>
    <text x="550" y="380" text-anchor="middle">27</text>
    <text x="621" y="380" text-anchor="middle">28</text>
    
    <!-- Week 5 -->
    <text x="195" y="430" text-anchor="middle">29</text>
    <text x="266" y="430" text-anchor="middle">30</text>
    <text x="337" y="430" text-anchor="middle">31</text>
  </g>
  
  <!-- Legend -->
  <g transform="translate(170, 460)">
    <circle cx="0" cy="0" r="8" fill="#06d6a0" opacity="0.3"/>
    <text x="20" y="5" font-family="Arial, sans-serif" font-size="14" fill="#333">Disponible</text>
    
    <circle cx="130" cy="0" r="8" fill="#e63946" opacity="0.2"/>
    <text x="150" y="5" font-family="Arial, sans-serif" font-size="14" fill="#333">Réservé</text>
    
    <circle cx="250" cy="0" r="8" fill="#0077b6" opacity="0.8"/>
    <text x="270" y="5" font-family="Arial, sans-serif" font-size="14" fill="#333">Sélectionné</text>
  </g>
  
  <!-- Title -->
  <text x="400" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" fill="white" font-weight="bold">RÉSERVATIONS</text>
  
  <!-- Clock icon -->
  <circle cx="120" cy="300" r="30" fill="white" opacity="0.2"/>
  <circle cx="120" cy="300" r="20" fill="none" stroke="white" stroke-width="3" opacity="0.5"/>
  <line x1="120" y1="300" x2="120" y2="290" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="120" y1="300" x2="128" y2="300" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  
  <!-- Activity icons -->
  <g transform="translate(680, 280)" fill="white" opacity="0.2">
    <circle cx="0" cy="0" r="30"/>
    <rect x="-10" y="-15" width="20" height="25" rx="3"/>
    <circle cx="0" cy="-20" r="8"/>
  </g>
</svg>